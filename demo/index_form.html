<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HAL Bibliography Integrator - Demo</title>

    <!-- HAL BIBLIOGRAPHY INTEGRATOR DEPENDENCIES -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- HAL BIBLIOGRAPHY INTEGRATOR STYLES -->
    <!-- Styles are included by ViteJs -->

    <!-- Optional to deal with mathematical expression in article titles -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                processEscapes: true,
                tags: "all"
            },
            svg: {
                fontCache: 'global'
            },
            loader: {
                load: ['[tex]/html']
            }
        };
    </script>
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-svg.min.js"
        integrity="sha512-EtUjpk/hY3NXp8vfrPUJWhepp1ZbgSI10DKPzfd+3J/p2Wo89JRBvQIdk3Q83qAEhKOiFOsYfhqFnOEv23L+dA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script> -->
    <!-- <script defer src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/4.0.0/tex-svg.min.js"
        integrity="sha512-JBvT4lHnIhbktDR7xvJbyObGFZU3uNkwiN7ubopyb4RkUDOHQuZpS/8izmKsJG3k+Mvj11FMyeRWrjgxEJ6K4Q=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script> -->
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-svg.js"></script>

    <!-- DEMO SPECIFIC STYLES -->
    <link rel="stylesheet" href="./assets/css/demo-style.css">
</head>

<body>
    <header>
        <h1>HAL Bibliography Integrator - Demo</h1>
    </header>
    <aside>
        <!-- FORM TO SET HBI PARAMETERS -->
        <form>
            <label for="idhal">HAL ID</label>
            <input type="text" id="idhal" name="idhal" size="20" required>

            <fieldset>
                <legend>Plugins</legend>

                <div>
                    <input type="checkbox" id="toggle-wc" name="toggle-wc">
                    <label for="toggle-wc">Wordcloud</label>
                </div>

                <div>
                    <input type="checkbox" id="toggle-artdat" name="toggle-artdat">
                    <label for="toggle-artdat">Articles data</label>
                </div>
                <div>
                    <input type="checkbox" id="toggle-charts" name="toggle-charts">
                    <label for="toggle-charts">Charts</label>
                </div>
            </fieldset>

            <fieldset id="formDocTypes">
                <legend>Documents Types</legend>
            </fieldset>

            <fieldset id="formChartTypes">
                <legend>Chart Types</legend>
            </fieldset>

            <fieldset>
                <legend>Display</legend>
                <div>
                    <input type="checkbox" id="toggle-display" name="toggle-display">
                    <label for="toggle-display">Collapsed Articles Data onLoad</label>
                </div>
            </fieldset>
            <button type="submit">Submit</button>
        </form>
    </aside>

    <main>
        <!-- MAIN SECTION TO DISPLAY HBI RESULTS -->
        <div id="hal-wordcloud-integrator"></div>
        <div id="hal-bibliography-integrator"></div>
        <div id="hal-charts-integrator"></div>
    </main>

    <footer>
        &copy; 2026 Timothée Schmoderer. All rights reserved.
    </footer>

    <!-- HBI DEMO CONFIGURATION -->
    <script type="text/javascript">
        const hal_integrator_config = {
            "id": "timothee-schmoderer", // enter HAL identifier
            // Configure documents to fetch
            "typeList": [
                "THESE",
                "ART",
                "PROCEEDINGS",
                "UNDEFINED",
                "COMM"
            ],
            // Configure plugins
            "plugins": {
                // article score plugin 
                "artscore": {
                    "scimago": {},
                    "semantic": {},
                    "scopus": {
                        "apiKey": "abc",
                    }
                }
            },
            "doit": true,
            "debug": true
        }
    </script>

    <!-- HBI DEMO MAIN MODULE -->
    <script type="module">
        import { hbi_start } from '../src/js/main.js'
        hbi_start(hal_integrator_config);
    </script>

    <!-- HBI DEMO WORDCLOUD PLUGIN -->
    <script src="../src/plugins/wordcloud/js/main.js"></script>
</body>

</html>
