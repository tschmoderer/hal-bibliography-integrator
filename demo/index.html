<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HAL Bibliography Integrator - Demo</title>

    <!-- HAL BIBLIOGRAPHY INTEGRATOR DEPENDENCIES -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- HAL BIBLIOGRAPHY INTEGRATOR STYLES -->
    <!-- Styles are included by ViteJs -->

    <!-- Optional to deal with mathematical expression in article titles -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                processEscapes: true,
                tags: "all"
            },
            svg: {
                fontCache: 'global'
            },
            loader: {
                load: ['[tex]/html']
            }
        };
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-svg.js"></script>

    <!-- DEMO SPECIFIC STYLES -->
    <link rel="stylesheet" href="./assets/css/demo-style.css">
</head>

<body>
    <header>
        <h1>HAL Bibliography Integrator - Demo</h1>
    </header>

    <main>
        <h2>Publications of Timothée Schmoderer</h2>
        <!-- MAIN SECTION TO DISPLAY HBI RESULTS -->
        <div id="hbi-wordcloud-integrator"></div>
        <div id="hbi-bibliography-integrator"></div>
        <div id="hbi-charts-integrator"></div>
    </main>

    <footer>
        &copy; 2026 Timothée Schmoderer. All rights reserved.
    </footer>

    <!-- HBI DEMO CONFIGURATION -->
    <script type="text/javascript">
        const hal_integrator_config = {
            "id": "timothee-schmoderer", // enter HAL identifier
            // Configure documents to fetch
            "typeList": [
                "THESE",
                "ART",
                "PROCEEDINGS",
                "UNDEFINED",
                "COMM"
            ],
            // Configure plugins
            "plugins": {
                // article score plugin 
                "artscore": {
                    "scimago": {},
                    "semantic": {},
                    "scopus": {
                        "apiKey": "abc",
                    }
                },
                "wordcloud": {
                    "doit": true,
                    "debug": true,
                }
            },
            "doit": true,
            "debug": false,
        }
    </script>

    <!-- HBI DEMO MAIN MODULE -->
    <script type="module">
        import { hbi_start } from '../src/js/main.js'
        import { hbi_plugin_wordcloud_start } from '../src/plugins/wordcloud/js/main.js'

        hbi_start(hal_integrator_config);
        hbi_plugin_wordcloud_start(hal_integrator_config);
    </script>
</body>

</html>
