<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HAL Bibliography Integrator - Demo</title>

    <!-- HAL BIBLIOGRAPHY INTEGRATOR DEPENDENCIES -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- HAL BIBLIOGRAPHY INTEGRATOR STYLES -->
    <!-- Styles are included by ViteJs -->

    <!-- Optional to deal with mathematical expression in article titles -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                processEscapes: true,
                tags: "all"
            },
            svg: {
                fontCache: 'global'
            },
            loader: {
                load: ['[tex]/html']
            }
        };
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-svg.js"></script>

    <!--  Chart JS Module for the HBI Charts Plugin -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"
        integrity="sha512-Y51n9mtKTVBh3Jbx5pZSJNDDMyY+yGe77DGtBPzRlgsf/YLCh13kSZ3JmfHGzYFCmOndraf0sQgfM654b7dJ3w=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- DEMO SPECIFIC STYLES -->
    <link rel="stylesheet" href="./assets/css/demo-style.css">
</head>

<body>
    <header>
        <h1>HAL Bibliography Integrator - Demo</h1>
    </header>

    <main>
        <!-- MAIN SECTION TO DISPLAY HBI RESULTS -->
        <h2>Keyword cloud of Timothée Schmoderer</h2>
        <div id="hbi-wordcloud-integrator"></div>
        <h2>Publications of Timothée Schmoderer</h2>
        <div id="hbi-bibliography-integrator"></div>
        <h2>Statistics of Timothée Schmoderer</h2>
        <div id="hbi-charts-integrator"></div>
    </main>

    <footer>
        &copy; 2026 Timothée Schmoderer. All rights reserved.
    </footer>

    <!-- HBI DEMO CONFIGURATION -->
    <script type="text/javascript">
        const hal_bibliography_integrator_conf = {
            "id": "timothee-schmoderer", // enter HAL identifier
            // Configure documents to fetch
            "typeList": [
                "THESE",
                "ART",
                "PROCEEDINGS",
                "UNDEFINED",
                "COMM"
            ],
            "doit": true, // trigger
            "debug": false, // enable logs
            "onLoad": "expended", // section default behavior (expended || collapsed)
            // Configure plugins
            "plugins": {
                // article score plugin configuration 
                "artscore": {
                    "scimago": {
                        "Systems & Control Letters": "Systems and Control Letters",
                        "ESAIM: Control, Optimisation and Calculus of Variations": "ESAIM - Control, Optimisation and Calculus of Variations",
                    },
                    "semantic": {},
                    "scopus": {
                        "apiKey": "ba28b7b16741bdbc327b34c7b8a8ee24",
                    },
                    "doit": true,
                    "debug": false,
                },
                // keyword cloud plugin configuration 
                "wordcloud": {
                    "doit": true,
                    "debug": false,
                },
                // charts plugin configuration 
                "charts": {
                    "doit": true,
                    "debug": true,
                    "maxCategories": 8, // not used
                    "renameThematiques": {}, // not used
                    "renameDomaines": {}, // not used
                    "show": [
                        "metrics",
                        "thematiques",// not used
                        "domaines",// not used
                        "citations"
                    ], // list of charts to display, by default everything is displayed. If we want none, either set the 'doit' key to false or set 'show' to the empty array []
                }
            },
        }
    </script>

    <script type="module">
        // HBI DEMO
        import { hbi_start } from '../src/js/main.js'
        import { hbi_plugin_wordcloud_start } from '../src/plugins/wordcloud/js/main.js'
        import { hbi_plugin_artscore_start } from '../src/plugins/artscore/js/main.js'
        import { hbi_plugin_charts_start } from '../src/plugins/charts/js/main.js'

        // HBI MAIN MODULE
        hbi_start(hal_bibliography_integrator_conf);

        // HBI WORDCLOUD PLUGIN
        hbi_plugin_wordcloud_start(hal_bibliography_integrator_conf);

        // HBI ARTSCORE PLUGIN
        hbi_plugin_artscore_start(hal_bibliography_integrator_conf);

        // HBI CHARTS PLUGIN
        hbi_plugin_charts_start(hal_bibliography_integrator_conf);
    </script>
</body>

</html>
